<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diego Ara — CV</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d1b2a;
      --accent: #4a9eca;
      --accent2:#1e5f8a;
      --glow:   rgba(74,158,202,0.18);
      --text:   #dce9f5;
      --muted:  #6b94b3;
      --line:   rgba(74,158,202,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      opacity: 0.6;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: rgba(13,27,42,0.72);
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 4rem 5rem;
      max-width: 640px;
      width: 100%;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 0 0 1px rgba(74,158,202,0.07),
        0 8px 48px rgba(0,0,0,0.55),
        0 0 80px var(--glow);
      animation: fadeUp 1.1s cubic-bezier(.22,.61,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
      animation: fadeUp 1.1s .15s cubic-bezier(.22,.61,.36,1) both;
    }
    .top-rule span {
      font-size: .65rem;
      letter-spacing: .22em;
      color: var(--accent);
      white-space: nowrap;
      text-transform: uppercase;
    }
    .top-rule::before,
    .top-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .5;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 4.4rem);
      line-height: 1;
      letter-spacing: .04em;
      color: #fff;
      animation: fadeUp 1.1s .25s cubic-bezier(.22,.61,.36,1) both;
    }
    .name em {
      font-style: normal;
      color: var(--accent);
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: var(--accent);
      margin: 1.8rem 0;
      animation: expand 1s .55s ease both;
    }
    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 3rem; opacity: 1; }
    }

    .email-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      animation: fadeUp 1.1s .4s cubic-bezier(.22,.61,.36,1) both;
    }
    .email-label {
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .email-link {
      font-family: 'DM Mono', monospace;
      font-size: .88rem;
      color: var(--accent);
      text-decoration: none;
      position: relative;
      transition: color .25s;
    }
    .email-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width .3s ease;
    }
    .email-link:hover { color: #a0d4f5; }
    .email-link:hover::after { width: 100%; }

    .section-title {
      font-size: .6rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2.4rem;
      margin-bottom: 1.2rem;
      animation: fadeUp 1.1s .5s cubic-bezier(.22,.61,.36,1) both;
    }

    .exp-card {
      border-left: 2px solid var(--accent2);
      padding: 1rem 1.3rem;
      background: rgba(74,158,202,0.05);
      border-radius: 0 2px 2px 0;
      position: relative;
      animation: fadeUp 1.1s .6s cubic-bezier(.22,.61,.36,1) both;
      transition: background .3s;
    }
    .exp-card:hover {
      background: rgba(74,158,202,0.10);
    }
    .exp-card::before {
      content: '';
      position: absolute;
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    .exp-role {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: .03em;
      margin-bottom: .4rem;
    }
    .exp-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .exp-badge {
      font-size: .58rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent2);
      border-radius: 2px;
      padding: .2rem .6rem;
    }
    .exp-years {
      font-size: .72rem;
      color: var(--muted);
    }
    .exp-years strong {
      color: var(--text);
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      animation: fadeUp 1.1s .7s cubic-bezier(.22,.61,.36,1) both;
    }
    .year {
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .dot-row { display: flex; gap: .5rem; }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: .4s; }
    .dot:nth-child(3) { animation-delay: .8s; }
    @keyframes pulse {
      0%, 100% { opacity: .3; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.4); }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 6px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<main>
  <div class="card">

    <div class="top-rule">
      <span>Curriculum Vitae</span>
    </div>

    <h1 class="name">Diego <em>Ara</em><span class="cursor"></span></h1>

    <div class="divider"></div>

    <div class="email-row">
      <span class="email-label">correo</span>
      <a class="email-link" href="mailto:diego.ara@galileo.edu">diego.ara@galileo.edu</a>
    </div>

    <p class="section-title">Experiencia Laboral</p>

    <div class="exp-card">
      <div class="exp-role">Diseñador de Software</div>
      <div class="exp-meta">
        <span class="exp-badge">Tiempo completo</span>
        <span class="exp-years"><strong>5</strong> años de experiencia</span>
      </div>
    </div>

    <div class="bottom-bar">
      <span class="year">&copy; 2026</span>
      <div class="dot-row">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </div>
</main>

<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  const COLORS = ['#1e5f8a','#2a7db5','#4a9eca','#6bbde0'];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createParticle() {
    return {
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     Math.random() * 1.6 + 0.3,
      vx:    (Math.random() - .5) * .35,
      vy:    (Math.random() - .5) * .35,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * .6 + .15,
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 110 }, createParticle);
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 130) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(74,158,202,' + ((1 - d / 130) * 0.12) + ')';
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    var g = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, Math.max(W,H)*.7);
    g.addColorStop(0, 'rgba(16,34,54,.65)');
    g.addColorStop(1, 'rgba(8,15,24,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    drawConnections();
    particles.forEach(function(p) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  init();
  loop();
</script>
</body>
</html>
